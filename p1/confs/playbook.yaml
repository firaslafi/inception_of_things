---
- name: Prep Ubuntu System on All Nodes
  hosts: all
  become: true
  tasks:
    - name: Disable UFW firewall
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
      failed_when: false

- name: Setup K3s Server
  hosts: k3s_master
  become: true
  tasks:
    - name: Install K3s Server bound to the private network IP
      ansible.builtin.shell: >
        curl -sfL https://get.k3s.io | 
        INSTALL_K3S_EXEC="--node-ip=192.168.56.110 --bind-address=192.168.56.110 --advertise-address=192.168.56.110 --write-kubeconfig-mode=644" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Fetch K3s Join Token to the Host Machine
      ansible.builtin.fetch:
        src: /var/lib/rancher/k3s/server/node-token
        dest: /tmp/k3s-node-token
        flat: true

    - name: Configure kubectl context for vagrant user
      ansible.builtin.shell: |
        mkdir -p /home/vagrant/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/vagrant/.kube/config
        chown -R vagrant:vagrant /home/vagrant/.kube

- name: Setup K3s Worker
  hosts: k3s_worker
  become: true
  tasks:
    - name: Install K3s Agent and Join Cluster
      ansible.builtin.shell: >
        curl -sfL https://get.k3s.io | 
        K3S_URL="https://192.168.56.110:6443" 
        K3S_TOKEN="{{ lookup('file', '/tmp/k3s-node-token') | trim }}" 
        INSTALL_K3S_EXEC="--node-ip=192.168.56.111" sh -
      args:
        creates: /usr/local/bin/k3s-agent