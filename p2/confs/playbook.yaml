---
# It is recommended to turn off ufw
- name: Prep Ubuntu System
  hosts: all
  become: true
  tasks:
    - name: Disable UFW firewall
      ansible.builtin.systemd:
        name: ufw
        state: stopped
        enabled: false
      failed_when: false

- name: Setup K3s Server
  hosts: k3s_server
  become: true
  tasks:
    - name: Install K3s Server bound to the private network IP
      ansible.builtin.shell: >
        curl -sfL https://get.k3s.io | 
        INSTALL_K3S_EXEC="--node-ip=192.168.56.110 --bind-address=192.168.56.110 --advertise-address=192.168.56.110 --tls-san=192.168.56.110 --write-kubeconfig-mode=644" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Configure kubectl context for vagrant user
      ansible.builtin.shell: |
        mkdir -p /home/vagrant/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/vagrant/.kube/config
        chown -R vagrant:vagrant /home/vagrant/.kube
        chmod 600 /home/vagrant/.kube/config